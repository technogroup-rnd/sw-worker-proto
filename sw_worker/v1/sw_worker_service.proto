syntax = "proto3";

package sw_worker.v1;

import "sw_worker/v1/common.proto";

// gRPC-сервис для обработки CAD-файлов SolidWorks.
// Все операции унарные и атомарные. Сервис принимает одну операцию за раз —
// при занятом буфере возвращает RESOURCE_EXHAUSTED.
// Каждый запрос требует изолированного working_directory с flat-copy всех
// нужных файлов (все файлы в одном каталоге, уникальные имена — ответственность оркестратора).
//
// ── Crash recovery (Level 2 restart) ────────────────────────────────────────
//
// Worker сохраняет прогресс операции в persistent storage. После незапланированного
// перезапуска (crash, reboot) состояние in_progress операции остаётся в БД.
//
// Контракт с оркестратором:
//   • Чтобы возобновить прерванную операцию — оркестратор ДОЛЖЕН переотправить
//     тот же запрос (тот же path / working_directory, тот же RPC) первым запросом
//     после обнаружения восстановления Worker. Worker обнаружит незавершённую
//     операцию и продолжит с последнего checkpoint.
//   • Если оркестратор отправляет другой запрос или не переотправляет —
//     предыдущая незавершённая операция считается abandoned и будет очищена
//     Worker после завершения следующей операции.
//
// Инвариант: возможность resume доступна только до завершения следующей операции.
// Worker не гарантирует хранение in_progress состояния дольше одного цикла запросов.
service SwWorkerService {

  // Построить граф зависимостей для файлов по указанному пути.
  // path может быть путём к файлу или к каталогу (все SW-файлы в каталоге).
  // Возвращает один merged граф (при directory scan — все корни объединены).
  // Деталь без ссылок даёт граф из одного узла.
  //
  // Ответ: oneof outcome — либо CollectResult (бизнес-результат),
  // либо MaintenanceSignal (плановый reboot, повторить запрос после восстановления).
  //
  // Ошибки:
  //   INVALID_ARGUMENT    — path не существует или не является SW-файлом / каталогом
  //   RESOURCE_EXHAUSTED  — буфер занят (выполняется другая операция)
  //   UNAVAILABLE         — процесс SolidWorks не готов или аварийная перезагрузка
  //   INTERNAL            — непредвиденный сбой SW
  rpc CollectDependencies(CollectDependenciesRequest) returns (CollectDependenciesResponse);

  // Записать пользовательские свойства в файлы (ItemNode.write_properties,
  // ConfigNode.write_properties), затем принудительно пересобрать и сохранить все файлы.
  // STANDARD_* и BOM_MATERIAL элементы пропускаются (read-only / виртуальные).
  // Файлы без write_properties пересобираются, но их свойства не изменяются.
  // Сервис определяет порядок пересборки по графу (leaves → roots:
  // сначала детали, затем сборки, чертежи последними).
  // После записи и rebuild свойства перечитываются и возвращаются в response.
  //
  // Ответ: oneof outcome — либо RebuildResult (бизнес-результат),
  // либо MaintenanceSignal (плановый reboot, повторить запрос после восстановления).
  //
  // Ошибки:
  //   INVALID_ARGUMENT    — working_directory не существует или граф пуст
  //   RESOURCE_EXHAUSTED  — буфер занят (выполняется другая операция)
  //   UNAVAILABLE         — процесс SolidWorks не готов или аварийная перезагрузка
  //   INTERNAL            — непредвиденный сбой SW
  rpc RebuildWithProperties(RebuildWithPropertiesRequest) returns (RebuildWithPropertiesResponse);

  // Вернуть текущее состояние здоровья сервиса и текущей операции.
  // Не ставится в буфер — возвращает результат немедленно, не ожидая SW-сессии.
  //
  // Готовность к работе определяется как:
  //   service_state == OPERATIONAL && process.running && !process.degraded
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Отменить текущую операцию (одна операция за раз — ID не требуется).
  // Активная операция останавливается на ближайшей безопасной границе файла (не посередине файла).
  // Опрашивать GetStatus, пока current_operation не станет пустым, прежде чем освобождать хранилище.
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Подтвердить перезагрузку машины (Level 2 recycling).
  // Шаг 2 протокола MaintenanceSignal — вызывается оркестратором после:
  //   (a) получения MaintenanceSignal в ответе на Collect/Rebuild
  //   (b) завершения своих файловых операций (sync, upload)
  // Инициирует shutdown /r /t 0 — gRPC-ответ уходит до реального ребута
  // (Process.Start возвращается немедленно, Windows shutdown sequence занимает секунды).
  // После ребута Worker стартует автоматически (Task Scheduler onlogon).
  // Далее оркестратор переходит к шагу 3 протокола: poll GetStatus до OPERATIONAL.
  //
  // Ошибки:
  //   FAILED_PRECONDITION — service_state != REBOOTING (MaintenanceSignal не был отправлен)
  rpc ApproveReboot(ApproveRebootRequest) returns (ApproveRebootResponse);
}

// ── CollectDependencies ──────────────────────────────────────────────────────

message CollectDependenciesRequest {
  // Путь к SW-файлу (один граф) или к каталогу (все SW-файлы сканируются, результаты сливаются).
  string path = 1;
}

message CollectDependenciesResponse {
  oneof outcome {
    CollectResult     result      = 1;
    MaintenanceSignal maintenance = 2;
  }
}

// Бизнес-результат CollectDependencies.
message CollectResult {
  // Merged граф зависимостей. При directory scan — все корни объединены в один граф
  // (disconnected components допустимы). Содержит уровни элементов и конфигураций,
  // а также missing/errors.
  DependencyGraph graph = 1;
}

// ── RebuildWithProperties ────────────────────────────────────────────────────

message RebuildWithPropertiesRequest {
  // Каталог, в котором размещены все файлы (flat-copy буфер).
  string working_directory = 1;

  // Граф из CollectDependencies, дополненный оркестратором.
  // Свойства для записи задаются через ItemNode.write_properties и ConfigNode.write_properties.
  // write_properties — sparse map: указываются только поля для создания или перезаписи.
  DependencyGraph graph = 2;
}

message RebuildWithPropertiesResponse {
  oneof outcome {
    RebuildResult     result      = 1;
    MaintenanceSignal maintenance = 2;
  }
}

// Бизнес-результат RebuildWithProperties.
message RebuildResult {
  // Результаты по каждому элементу в порядке обхода графа (leaves → roots).
  repeated ItemResult results = 1;

  // Тот же граф что в запросе, но с обновлёнными properties после записи и rebuild.
  // properties перечитываются из SW в рамках того же открытого документа (без дополнительных
  // открытий файлов). write_properties в response не заполняются (только для чтения).
  DependencyGraph graph = 2;
}

// ── Maintenance ──────────────────────────────────────────────────────────────

// Сигнал необходимости перезагрузки машины — возвращается ВМЕСТО бизнес-результата.
// Worker обнаружил давление на session-level ресурсы (atom table) и запрашивает
// подтверждение перезагрузки. Операция не завершена, прогресс сохранён в state store.
//
// Протокол оркестратора при получении MaintenanceSignal:
//   1. Завершить свои файловые операции (sync, upload) — working_directory
//      должен остаться нетронутым для resume после ребута.
//   2. Вызвать ApproveReboot RPC — это инициирует shutdown /r /t 0.
//      gRPC-ответ придёт до фактического выключения машины.
//   3. Поллить GetStatus (с retry при connection refused) до:
//        service_state == OPERATIONAL && process.running && !process.degraded
//   4. Переотправить ТОТ ЖЕ запрос (тот же path / working_directory).
//      Worker обнаружит незавершённую операцию и продолжит с последнего checkpoint.
//
// Если оркестратор не вызовет ApproveReboot в течение таймаута
// (ApproveRebootTimeoutMinutes, default 10 мин) — Worker инициирует reboot
// самостоятельно. Оркестратор увидит connection drop и пойдёт по пути
// аварийного перезапуска (poll GetStatus → resend).
message MaintenanceSignal {
  string reason = 1; // human-readable ("atom table pressure exceeded threshold")
}

// ── GetStatus ────────────────────────────────────────────────────────────────

message GetStatusRequest {}

// Текущее состояние сервиса, процесса SolidWorks и Windows-сессии.
//
// Готовность к работе:
//   service_state == SERVICE_STATE_OPERATIONAL
//   && process.running == true
//   && process.degraded == false
message GetStatusResponse {
  // Уровень давления на ресурсы. Общая шкала для process-level и session-level метрик.
  // Пороги задаются через конфигурацию сервиса (SwWatchdogOptions, RecycleOptions).
  //
  // Триггер рестарта — порог >= HIGH (для обоих типов давления). HIGH и CRITICAL
  // операционно эквивалентны: оба инициируют рестарт на ближайшей границе файла.
  // Разделение на 5 уровней нужно для диагностической гранулярности — отследить
  // тренд нарастания давления до того как watchdog среагирует. Оркестратор не
  // инициирует рестарт на основании этих значений — они информативны.
  enum ResourcePressure {
    RESOURCE_PRESSURE_UNSPECIFIED = 0;
    RESOURCE_PRESSURE_LOW         = 1; // < 50% порога
    RESOURCE_PRESSURE_MODERATE    = 2; // >= 50%
    RESOURCE_PRESSURE_ELEVATED    = 3; // >= 67%
    RESOURCE_PRESSURE_HIGH        = 4; // >= 75% — watchdog планирует рестарт на границе файла
    RESOURCE_PRESSURE_CRITICAL    = 5; // >= 100% — watchdog планирует рестарт на границе файла (эквивалентно HIGH для действия, но сигнализирует превышение порога)
  }

  // Состояние жизненного цикла сервиса.
  // SERVICE_STATE_OPERATIONAL (default) = готов принимать работу.
  // Любое другое значение = не отправлять работу, поллить до OPERATIONAL.
  enum ServiceState {
    SERVICE_STATE_OPERATIONAL = 0; // нормальная работа, готов к работе
    SERVICE_STATE_REBOOTING   = 1; // плановый machine reboot (~3-5 мин)
  }

  // Здоровье процесса SolidWorks (сбрасывается при перезапуске SW).
  // Числовые поля — int32/int64 по Google API Design Guide (AIP-124): signed
  // ints стандартизированы для JSON + cross-language interop; типичные значения
  // всех счётчиков здесь далеки от Int32.MaxValue (PID, GDI/USER ≤ 10k, etc.).
  message ProcessHealth {
    // Identity
    int32 pid                    = 1; // PID sldworks.exe, 0 если не запущен
    bool  running                = 2; // процесс жив и отвечает на COM-вызовы

    // State
    bool             degraded    = 3; // SW в нестабильном состоянии после crash recovery
    ResourcePressure pressure    = 4; // worst-case по GDI/USER/RAM

    // Counters
    int64 uptime_seconds         = 5; // секунд с момента запуска SW, -1 если не запущен
    int32 restart_count          = 6; // перезапуски SW с момента старта Worker (сбрасывается при reboot)

    // Raw resource counters (диагностика)
    int32 gdi_objects            = 10;
    int32 user_objects           = 11;
    int32 gdi_peak               = 12;
    int64 free_system_memory_mb  = 13;
  }

  // Здоровье Windows-сессии (сбрасывается только при machine reboot).
  // Atom table — per-WindowStation ресурс, не освобождается при перезапуске процесса.
  message SessionHealth {
    int32            atom_table_used = 1; // занятых atom entries в WinSta0
    int32            atom_table_max  = 2; // максимум (16384); 0 = мониторинг выключен
    ResourcePressure pressure        = 3; // по порогу atom table
  }

  // Состояние lease'а из перспективы текущей операции. Зеркалит
  // SwWatchdog.SwOperationState — оркестратор наблюдает переходы во время
  // simulated crash test и в штатной работе.
  enum LeaseState {
    LEASE_STATE_UNSPECIFIED = 0; // lease не acquired (или между операциями)
    LEASE_STATE_NOT_READY   = 1; // lease acquired, SW не готов (cold start / mid-relaunch)
    LEASE_STATE_READY       = 2; // SW готов, Stage 3 complete — COM доступен
    LEASE_STATE_RESTARTING  = 3; // SW упал, auto-relaunch в процессе
    LEASE_STATE_FAILED      = 4; // launch-failure budget исчерпан для этого lease
    LEASE_STATE_DISPOSING   = 5; // lease DisposeAsync вызван, state-transitions остановлены
  }

  // Здоровье watchdog-а: lease и launch-failure budget.
  // operation_lease_active сигнализирует идёт ли операция (idle-shutdown
  // подавлён пока true). sw_unavailable = true означает что watchdog
  // терминально отказался запускать SW (достигнут LaunchFailureBudget) —
  // оркестратор не должен retry без admin intervention.
  message WatchdogHealth {
    bool       operation_lease_active = 1; // есть хотя бы один активный lease
    LeaseState lease_state            = 2; // state последнего acquired lease, или UNSPECIFIED
    int32      launch_failure_counter = 3; // текущий process-level launch-failure counter
    bool       sw_unavailable         = 4; // terminal: budget исчерпан, admin intervention needed
    optional string unavailable_reason = 5; // человекочитаемая причина (заполнено когда sw_unavailable=true)
  }

  // ── Fields ──

  ServiceState     service_state     = 1;
  ProcessHealth    process           = 2;
  SessionHealth    session           = 3;
  OperationInfo    current_operation = 4;
  WatchdogHealth   watchdog          = 5;
}

// Описывает текущую операцию.
message OperationInfo {
  enum Type {
    TYPE_UNSPECIFIED             = 0;
    TYPE_COLLECT_DEPENDENCIES    = 1;
    TYPE_REBUILD_WITH_PROPERTIES = 2;
  }

  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_RUNNING     = 1; // выполняется
    STATUS_CANCELLING  = 2; // Cancel вызван, ждём безопасной границы
  }

  string   id       = 1; // UUID, назначаемый сервером; стабилен в течение всей жизни операции
  Type     type     = 2;
  string   path     = 3; // путь (CollectDependencies) или working_directory
  Status   status   = 4;

  // Прогресс операции. Отсутствует в короткое окно между приёмом и началом исполнения.
  OperationProgress progress = 5;
}

// Прогресс выполнения операции на уровне операции.
message OperationProgress {
  int64 elapsed_seconds = 1;
  int64 eta_seconds     = 2; // оставшееся время по ВСЕЙ операции (все фазы), -1 = неизвестно
  int32 phase_count     = 3; // общее кол-во фаз в операции (известно с момента старта)

  // Текущая фаза. Отсутствует до первого StartPhase (короткое окно после старта операции).
  PhaseProgress current_phase = 4;
}

// Прогресс выполнения конкретной фазы.
message PhaseProgress {
  int32  number     = 1; // номер фазы, 1-based
  string name       = 2; // человекочитаемое: "scanning", "traversing assemblies"
  int32  items_total = 3; // элементов в этой фазе
  int32  items_done  = 4; // завершённых в этой фазе
  int64  eta_seconds = 5; // оставшееся время этой фазы, -1 = неизвестно
}

// ── Cancel ───────────────────────────────────────────────────────────────────

// Пустой запрос — отменяет текущую операцию (одна за раз, ID не требуется).
message CancelRequest {
  reserved 1;
  reserved "operation_id";
}

// Результат вызова Cancel.
message CancelResponse {
  bool cancelled = 1; // true если операция выполнялась и отменена, false если простаивал
}

// ── ApproveReboot ─────────────────────────────────────────────────────────────

// Подтверждение перезагрузки от оркестратора.
message ApproveRebootRequest {}

// Пустой ответ — факт получения означает что shutdown инициирован.
message ApproveRebootResponse {}

