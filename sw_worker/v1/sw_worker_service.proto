syntax = "proto3";

package sw_worker.v1;

import "sw_worker/v1/common.proto";

// gRPC-сервис для обработки CAD-файлов SolidWorks.
// Все операции унарные и атомарные. Сервис принимает одну операцию за раз —
// при занятом буфере возвращает RESOURCE_EXHAUSTED.
// Каждый запрос требует изолированного working_directory с flat-copy всех
// нужных файлов (все файлы в одном каталоге, уникальные имена — ответственность оркестратора).
service SwWorkerService {

  // Построить граф зависимостей для файлов по указанному пути.
  // path может быть путём к файлу или к каталогу (все SW-файлы в каталоге).
  // Возвращает один merged граф (при directory scan — все корни объединены).
  // Деталь без ссылок даёт граф из одного узла.
  //
  // Ошибки:
  //   INVALID_ARGUMENT    — path не существует или не является SW-файлом / каталогом
  //   RESOURCE_EXHAUSTED  — буфер занят (выполняется другая операция)
  //   UNAVAILABLE         — процесс SolidWorks не готов
  //   INTERNAL            — непредвиденный сбой SW
  rpc CollectDependencies(CollectDependenciesRequest) returns (CollectDependenciesResponse);

  // Записать пользовательские свойства в файлы (ItemNode.write_properties,
  // ConfigNode.write_properties), затем принудительно пересобрать и сохранить все файлы.
  // STANDARD_* и BOM_MATERIAL элементы пропускаются (read-only / виртуальные).
  // Файлы без write_properties пересобираются, но их свойства не изменяются.
  // Сервис определяет порядок пересборки по графу (leaves → roots:
  // сначала детали, затем сборки, чертежи последними).
  // После записи и rebuild свойства перечитываются и возвращаются в response.
  //
  // Ошибки:
  //   INVALID_ARGUMENT    — working_directory не существует или граф пуст
  //   RESOURCE_EXHAUSTED  — буфер занят (выполняется другая операция)
  //   UNAVAILABLE         — процесс SolidWorks не готов
  //   INTERNAL            — непредвиденный сбой SW
  rpc RebuildWithProperties(RebuildWithPropertiesRequest) returns (RebuildWithPropertiesResponse);

  // Вернуть текущее состояние здоровья сервиса и текущей операции.
  // Не ставится в буфер — возвращает результат немедленно, не ожидая SW-сессии.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Отменить операцию по ID (из GetStatus → current_operation.id).
  // operation_id не должен быть пустым — иначе возвращается INVALID_ARGUMENT.
  // Активная операция останавливается на ближайшей безопасной границе файла (не посередине файла).
  // Опрашивать GetStatus, пока current_operation не станет пустым, прежде чем освобождать хранилище.
  //
  // Ошибки:
  //   INVALID_ARGUMENT  — operation_id пуст
  rpc Cancel(CancelRequest) returns (CancelResponse);
}

// ── CollectDependencies ──────────────────────────────────────────────────────

message CollectDependenciesRequest {
  // Путь к SW-файлу (один граф) или к каталогу (все SW-файлы сканируются, результаты сливаются).
  string path = 1;
}

message CollectDependenciesResponse {
  // Merged граф зависимостей. При directory scan — все корни объединены в один граф
  // (disconnected components допустимы). Содержит уровни элементов и конфигураций,
  // а также missing/errors.
  DependencyGraph graph = 1;
}

// ── RebuildWithProperties ────────────────────────────────────────────────────

message RebuildWithPropertiesRequest {
  // Каталог, в котором размещены все файлы (flat-copy буфер).
  string working_directory = 1;

  // Граф из CollectDependencies, дополненный оркестратором.
  // Свойства для записи задаются через ItemNode.write_properties и ConfigNode.write_properties.
  // write_properties — sparse map: указываются только поля для создания или перезаписи.
  DependencyGraph graph = 2;
}

message RebuildWithPropertiesResponse {
  // Результаты по каждому элементу в порядке обхода графа (leaves → roots).
  repeated ItemResult results = 1;

  // Тот же граф что в запросе, но с обновлёнными properties после записи и rebuild.
  // properties перечитываются из SW в рамках того же открытого документа (без дополнительных
  // открытий файлов). write_properties в response не заполняются (только для чтения).
  DependencyGraph graph = 2;
}

// ── GetStatus ────────────────────────────────────────────────────────────────

message GetStatusRequest {}

// Описывает текущую операцию.
message OperationInfo {
  string          id     = 1; // UUID, назначаемый сервером; стабилен в течение всей жизни операции
  OperationType   type   = 2;
  string          path   = 3; // путь (CollectDependencies) или working_directory
  OperationStatus status = 4;

  // Прогресс операции. Отсутствует в короткое окно между приёмом и началом исполнения.
  OperationProgress progress = 5;
}

// Прогресс выполнения операции на уровне операции.
message OperationProgress {
  int64 elapsed_seconds = 1;
  int64 eta_seconds     = 2; // оставшееся время по ВСЕЙ операции (все фазы), -1 = неизвестно
  int32 phase_count     = 3; // общее кол-во фаз в операции (известно с момента старта)

  // Текущая фаза. Отсутствует до первого StartPhase (короткое окно после старта операции).
  PhaseProgress current_phase = 4;
}

// Прогресс выполнения конкретной фазы.
message PhaseProgress {
  int32  number     = 1; // номер фазы, 1-based
  string name       = 2; // человекочитаемое: "scanning", "traversing assemblies"
  int32  items_total = 3; // элементов в этой фазе
  int32  items_done  = 4; // завершённых в этой фазе
  int64  eta_seconds = 5; // оставшееся время этой фазы, -1 = неизвестно
}

// Текущее состояние здоровья сервиса и текущей операции.
message GetStatusResponse {
  // Уровень давления на ресурсы (GDI, USER, RAM). Worst-case по всем ресурсам.
  // Caller использует для проактивного решения о рестарте SW между файлами.
  enum ResourcePressure {
    LOW       = 0; // < 50% любого порога
    MODERATE  = 1; // >= 50% какого-то порога
    ELEVATED  = 2; // >= 67% какого-то порога
    HIGH      = 3; // >= 75% какого-то порога — рекомендуется завершить и рестартнуть
    CRITICAL  = 4; // >= 100% какого-то порога — NeedsRestart() вернёт true
  }

  // Здоровье
  bool  is_healthy = 1; // агрегат: sw_running && !degraded; false = сервис не может принимать работу
  bool  sw_running = 2; // процесс SоlidWorks запущен и отвечает на COM-вызовы
  bool  degraded   = 3; // SW в нестабильном состоянии (COM-crash, утечка); требуется перезапуск
  int64 memory_mb  = 4; // рабочий набор процесса SW в МБ (legacy, см. free_system_memory_mb)

  // Текущая операция. Отсутствует, если сервис простаивает.
  OperationInfo current_operation = 5;

  // Ресурсы SW-процесса (GDI/USER/RAM)
  uint32 gdi_objects           = 6;  // текущее кол-во GDI объектов SW-процесса
  uint32 user_objects          = 7;  // текущее кол-во USER объектов SW-процесса
  uint32 gdi_peak              = 8;  // пиковое значение GDI с момента запуска SW
  int64  free_system_memory_mb = 9;  // свободная физическая RAM в системе (MB)
  ResourcePressure resource_pressure = 10; // worst-case давление по всем ресурсам
}

// ── Cancel ───────────────────────────────────────────────────────────────────

// Определяет операцию для отмены.
message CancelRequest {
  // ID операции для отмены (из GetStatus → current_operation.id).
  // Не должен быть пустым; иначе возвращается INVALID_ARGUMENT.
  string operation_id = 1;
}

// Результат вызова Cancel.
message CancelResponse {
  bool cancelled = 1; // true если операция найдена и отменена, false если не найдена
}

// ── Enums ─────────────────────────────────────────────────────────────────────

enum OperationType {
  OPERATION_TYPE_UNSPECIFIED             = 0;
  OPERATION_TYPE_COLLECT_DEPENDENCIES    = 1;
  OPERATION_TYPE_REBUILD_WITH_PROPERTIES = 2;
}

enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED = 0;
  OPERATION_STATUS_RUNNING     = 1; // выполняется
  OPERATION_STATUS_CANCELLING  = 2; // Cancel вызван, ждём безопасной границы
}
