syntax = "proto3";

package sw_worker.v1;

// ── DAG зависимостей ─────────────────────────────────────────────────────────
//
// Два уровня представления:
//   items       — уровень элементов (общие свойства, тип, sheet metal flag)
//   nodes       — конфигурационный уровень (DAG: parent-config → child-config с count)
//
// Конфигурационный граф — DAG:
//   - Roots = all_nodes − {edge.child_node_id for edge in edges}
//     (ноды без входящих рёбер; orphaned файлы — тоже roots с вырожденным графом)
//   - Shared nodes (одна конфигурация детали используется несколькими parent)
//   - SM-FLAT-PATTERN конфигурации исключены из nodes

// Граф зависимостей.
// При directory scan — один merged граф со всеми корнями (disconnected components допустимы).
message DependencyGraph {
  // Конфигурационные узлы DAG.
  // Ключ — "item_name:config" (например, "assembly.sldasm:Default").
  // Содержит узлы для всех конфигураций всех элементов, включая orphan.
  // SM-FLAT-PATTERN конфигурации исключены.
  map<string, ConfigNode> nodes = 1;

  // ID корневых конфигурационных узлов (ключи в nodes).
  // Derived property: roots = all_nodes − {edge.child_node_id for edge in edges}.
  // Заполняется SW-worker после merge, не задаётся вручную.
  repeated string roots = 2;

  // Данные уровня элементов. Ключ — имя элемента (например, "assembly.sldasm", "Сталь 08Х18Н10").
  // Свойства уровня элемента, общие для всех конфигураций.
  map<string, ItemNode> items = 3;

  // Имена файлов, на которые есть ссылки, но которые не найдены в буфере.
  repeated string missing = 4;

  // Элементы, которые не удалось прочитать (повреждённые, заблокированные).
  repeated ItemResult errors = 5;

  // Рёбра конфигурационного DAG: parent → child с количеством экземпляров.
  repeated Edge edges = 6;

  // Сопутствующие файлы (не-SW артефакты: DXF, PDF и т.п.),
  // привязанные к конфигурационным узлам (node_id).
  // File-level companions (без [configName]) ассоциируются
  // со ВСЕМИ конфигурациями файла.
  // Чертежи (.slddrw) — ноды графа, не companions.
  map<string, CompanionFileList> companions = 7;
}

// Узел уровня элемента — общие данные, не зависящие от конфигурации.
message ItemNode {
  // Тип элемента.
  enum ItemType {
    UNSPECIFIED         = 0;
    PART                = 1; // .sldprt
    STANDARD_PART       = 2; // .sldprt из SW Library (read-only, не открывается)
    ASSEMBLY            = 3; // .sldasm
    STANDARD_ASSEMBLY   = 4; // .sldasm из SW Library (read-only, не открывается)
    DRAWING             = 5; // .slddrw
    STANDARD_DRAWING    = 6; // .slddrw из SW Library (read-only, не открывается)
    BOM_MATERIAL        = 7; // PDM-объект без файла (добавляется оркестратором)
  }

  // Имя элемента (для CAD — имя файла без пути, для BOM_MATERIAL — идентификатор).
  string item_name = 1;

  // Тип элемента.
  ItemType item_type = 2;

  // Custom properties уровня файла (CustomPropertyManager("")).
  // Ключ — имя свойства, значение — resolved (вычисленное).
  // CollectDependencies: фильтруются по PropertyFilter.FileProperties из конфигурации сервиса.
  // RebuildWithProperties: PropertyFilter.FileProperties ∪ ключи из write_properties.
  // Используется только для чтения; не записывается в SW операцией RebuildWithProperties.
  map<string, string> properties = 3;

  // Является ли файл листовой деталью (sheet metal).
  // Определяется через SW API (GetBendState != swSMBendStateNone) на Collect фазе.
  bool is_sheet_metal = 4;

  // Sparse map свойств уровня файла для записи в SW (CustomPropertyManager("")).
  // Используется только в RebuildWithProperties.
  // Оркестратор указывает только те свойства, которые нужно создать или перезаписать.
  //
  // Поведение при записи (type coercion):
  //   - Существующее свойство: тип сохраняется; значение нормализуется под тип.
  //     Number/Double: любой из "12,5" / "12.5" принимается (нормализуется в "12.5").
  //                    Если значение не парсится как число — тип понижается до Text.
  //     YesOrNo:       "Yes" / "No" (case-insensitive). Иначе — тип понижается до Text.
  //     Date:          значение передаётся в SW без изменений (формат "DD.MM.YYYY").
  //     Text:          значение передаётся в SW без изменений.
  //   - Новое свойство (не существует в файле): всегда создаётся как Text.
  map<string, string> write_properties = 5;

  // Summary Information (стандартные OLE document properties).
  // Доступны через IModelDoc2.SummaryInfo — не Custom Properties, отдельный механизм.
  // Ключ — имя поля, значение — строка. Фиксированный набор допустимых ключей:
  //   "Title", "Subject", "Author", "Keywords", "Comment" (R/W),
  //   "SavedBy", "CreateDate", "SaveDate" (R/O).
  // CollectDependencies: фильтруются по PropertyFilter.SummaryProperties из конфигурации сервиса.
  // RebuildWithProperties: PropertyFilter.SummaryProperties ∪ ключи из write_summary_properties.
  // Используется только для чтения; запись — через write_summary_properties.
  map<string, string> summary_properties = 6;

  // Sparse map Summary Information для записи в SW (IModelDoc2.SummaryInfo).
  // Используется только в RebuildWithProperties.
  // Допустимы только записываемые поля: "Title", "Subject", "Author", "Keywords", "Comment".
  // Поля "SavedBy", "CreateDate", "SaveDate" — read-only, при записи игнорируются.
  map<string, string> write_summary_properties = 7;
}

// Конфигурационный узел DAG — одна конфигурация одного элемента.
message ConfigNode {
  // Имя элемента (для CAD — имя файла без пути).
  string item_name = 1;

  // Имя конфигурации SolidWorks. Пустая строка для BOM_MATERIAL.
  string config_name = 2;

  // Custom properties уровня конфигурации (CustomPropertyManager(config_name)).
  // Ключ — имя свойства, значение — resolved (вычисленное).
  // CollectDependencies: фильтруются по PropertyFilter.ConfigProperties из конфигурации сервиса.
  // RebuildWithProperties: PropertyFilter.ConfigProperties ∪ ключи из write_properties.
  // Используется только для чтения; не записывается в SW операцией RebuildWithProperties.
  map<string, string> properties = 3;

  // Sparse map свойств уровня конфигурации для записи в SW (CustomPropertyManager(config_name)).
  // Используется только в RebuildWithProperties.
  // Оркестратор указывает только те свойства, которые нужно создать или перезаписать.
  // Правила нормализации типов — аналогично ItemNode.write_properties.
  map<string, string> write_properties = 4;
}

// Ребро конфигурационного DAG: parent → child с количеством экземпляров.
message Edge {
  // ID родительского узла в формате "item_name:config" (ключ в nodes).
  string parent_node_id = 1;

  // ID дочернего узла в формате "item_name:config" (ключ в nodes).
  string child_node_id = 2;

  // Количество экземпляров компонента в родительской конфигурации.
  uint32 count = 3;
}

// Список сопутствующих файлов для одного конфигурационного узла.
// Только не-SW артефакты (DXF, PDF и т.п.). Чертежи — ноды графа.
message CompanionFileList {
  // Имена файлов без пути (например, "plate [Default].dxf").
  repeated string file_names = 1;
}

// Статус обработки отдельного элемента.
enum ItemResultStatus {
  ITEM_RESULT_STATUS_UNSPECIFIED = 0; // Не задан — трактуется как ERROR.
  ITEM_RESULT_STATUS_SUCCESS     = 1; // Элемент обработан успешно.
  ITEM_RESULT_STATUS_WARNING     = 2; // Элемент обработан, но есть оговорки (Collect: unresolved ref).
  ITEM_RESULT_STATUS_ERROR       = 3; // Элемент не обработан или данные некорректны.
  ITEM_RESULT_STATUS_SKIPPED     = 4; // Элемент сознательно пропущен (напр. стандартное изделие).
}

// Результат операции для отдельного элемента.
// Используется в DependencyGraph.errors (Collect) и RebuildWithPropertiesResponse.results (Rebuild).
message ItemResult {
  // Имя элемента (для CAD — имя файла без пути).
  string item_name        = 1;

  // Статус обработки элемента.
  ItemResultStatus status = 2;

  // Описание проблемы; пустая строка при status = SUCCESS.
  string error_message    = 3;
}
