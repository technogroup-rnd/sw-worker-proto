syntax = "proto3";

package sw_worker.v1;

// Тип файла документа SolidWorks.
enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_PART        = 1; // .sldprt
  FILE_TYPE_ASSEMBLY    = 2; // .sldasm
  FILE_TYPE_DRAWING     = 3; // .slddrw
}

// ── DAG зависимостей ─────────────────────────────────────────────────────────
//
// Два уровня представления:
//   files       — файловый уровень (общие свойства файла, тип, companion-файлы)
//   nodes       — конфигурационный уровень (DAG: parent-config → child-config с count)
//
// Конфигурационный граф — DAG с orphan nodes:
//   - Множество корней (все конфигурации корневого файла, кроме FlatPattern)
//   - Shared nodes (одна конфигурация детали используется несколькими parent)
//   - Orphan configs (конфигурация существует, но не используется ни одним parent)

// Граф зависимостей.
message DependencyGraph {
  // Конфигурационные узлы DAG.
  // Ключ — "filename:config" (например, "assembly.sldasm:Default").
  // Содержит узлы для всех конфигураций всех файлов, включая orphan.
  // FlatPattern конфигурации исключены.
  map<string, ConfigNode> nodes = 1;

  // ID корневых конфигурационных узлов (ключи в nodes).
  repeated string roots = 2;

  // Файловые данные. Ключ — имя файла (например, "assembly.sldasm").
  // Свойства уровня файла, общие для всех конфигураций.
  map<string, FileNode> files = 3;

  // Имена файлов, на которые есть ссылки, но которые не найдены в буфере.
  repeated string missing = 4;

  // Файлы, которые не удалось прочитать (повреждённые, заблокированные).
  repeated FileError errors = 5;
}

// Файловый узел — общие данные файла, не зависящие от конфигурации.
message FileNode {
  // Имя файла без пути к каталогу (например, "assembly.sldasm").
  string file_name = 1;

  // Тип документа SolidWorks.
  FileType file_type = 2;

  // Custom properties уровня файла (CustomPropertyManager("")).
  // Ключ — имя свойства, значение — resolved (вычисленное).
  // Фильтруются по PropertyFilter.FileProperties из конфигурации сервиса.
  // Используется только для чтения; не записывается в SW операцией RebuildWithProperties.
  map<string, string> properties = 3;

  // Содержит ли файл конфигурацию FlatPattern → сигнал для генерации DXF-развёрток.
  bool has_flat_pattern = 4;

  // Сопутствующие файлы уровня файла (чертежи, DXF, PDF и т.д.),
  // найденные по конвенции именования. Только имена файлов без пути.
  // Относятся ко всем конфигурациям файла.
  // Исключены: .sldprt, .sldasm (уже в графе зависимостей).
  repeated string companion_files = 5;

  // Sparse map свойств уровня файла для записи в SW (CustomPropertyManager("")).
  // Используется только в RebuildWithProperties.
  // Оркестратор указывает только те свойства, которые нужно создать или перезаписать.
  //
  // Поведение при записи (type coercion):
  //   - Существующее свойство: тип сохраняется; значение нормализуется под тип.
  //     Number/Double: любой из "12,5" / "12.5" принимается (нормализуется в "12.5").
  //                    Если значение не парсится как число — тип понижается до Text.
  //     YesOrNo:       "Yes" / "No" (case-insensitive). Иначе — тип понижается до Text.
  //     Date:          значение передаётся в SW без изменений (формат "DD.MM.YYYY").
  //     Text:          значение передаётся в SW без изменений.
  //   - Новое свойство (не существует в файле): всегда создаётся как Text.
  map<string, string> write_properties = 6;
}

// Конфигурационный узел DAG — одна конфигурация одного файла.
message ConfigNode {
  // Имя файла без пути к каталогу.
  string file_name = 1;

  // Имя конфигурации SolidWorks.
  string config_name = 2;

  // Дочерние компоненты (только активные, не suppressed в данной конфигурации).
  repeated ChildRef children = 3;

  // True, если конфигурация не используется ни одной родительской
  // конфигурацией в графе.
  bool is_orphan = 4;

  // Custom properties уровня конфигурации (CustomPropertyManager(config_name)).
  // Ключ — имя свойства, значение — resolved (вычисленное).
  // Фильтруются по PropertyFilter.ConfigProperties из конфигурации сервиса.
  // Используется только для чтения; не записывается в SW операцией RebuildWithProperties.
  map<string, string> properties = 5;

  // Сопутствующие файлы, специфичные для данной конфигурации.
  // Определяются по наличию [config_name] в имени файла.
  // Только имена файлов без пути.
  repeated string companion_files = 6;

  // Sparse map свойств уровня конфигурации для записи в SW (CustomPropertyManager(config_name)).
  // Используется только в RebuildWithProperties.
  // Оркестратор указывает только те свойства, которые нужно создать или перезаписать.
  // Правила нормализации типов — аналогично FileNode.write_properties.
  map<string, string> write_properties = 7;
}

// Ребро конфигурационного DAG: ссылка на дочерний компонент с количеством экземпляров.
message ChildRef {
  // ID дочернего узла в формате "filename:config" (ключ в nodes).
  string node_id = 1;

  // Количество экземпляров компонента в родительской конфигурации.
  uint32 count = 2;
}

// Результат операции для отдельного файла (RebuildFiles, RebuildWithProperties).
message FileResult {
  // Имя файла без пути к каталогу.
  string file_name     = 1;

  // True, если операция над данным файлом завершилась успешно.
  bool   success       = 2;

  // Описание ошибки; пустая строка, если success равно true.
  string error_message = 3;
}

// Файл, который не удалось прочитать в ходе CollectDependencies.
message FileError {
  // Имя файла без пути к каталогу.
  string file_name     = 1;

  // Описание ошибки.
  string error_message = 2;
}
